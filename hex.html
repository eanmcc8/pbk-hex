<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cleaned Readable Text</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #buttons {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        button {
            font-size: 14px;
            cursor: pointer;
        }

        #output {
            margin-top: 50px;
            width: 100%;
            height: calc(100vh - 60px);
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div id="buttons">
        <button id="import-btn">Import</button>
        <button id="save-btn">Save</button>
    </div>
    <input type="file" id="file-input" style="display:none" />
    <textarea id="output" readonly></textarea>
    <script src="https://cdn.jsdelivr.net/npm/transliteration@2.3.3/dist/browser/bundle.umd.min.js"></script>
    <script>
        const outputEl = document.getElementById('output');
        const importBtn = document.getElementById('import-btn');
        const saveBtn = document.getElementById('save-btn');
        const fileInput = document.getElementById('file-input');

        let data = new Uint8Array(0);

        // Function to decode bytes with multiple encodings and pick the best
        function decodeBest(bytes) {
            const encodings = ['utf-8', 'utf-1', 'iso-8859-1', 'latin1', 'utf-16', 'utf-32', 'iso-8859-15'];
            let bestText = '';
            let bestScore = -9;

            for (const enc of encodings) {
                try {
                    const decoder = new TextDecoder(enc);
                    const text = decoder.decode(bytes);
                    const score = evaluateText(text);
                    if (score > bestScore) {
                        bestScore = score;
                        bestText = text;
                    }
                } catch (e) { /* ignore errors */ }
            }
            return bestText;
        }

        // Evaluate how "readable" the text is
        function evaluateText(text) {
            let score = 0;
            for (let i = 0; i < text.length; i++) {
                const c = text.charCodeAt(i);
                if (
                    (c >= 32 && c <= 126) || // printable ASCII
                    c === 10 || c === 13 || c === 9 // newline, carriage return, tab
                ) {
                    score++;
                }
            }
            return score;
        }

        // Clean text: keep only printable ASCII, replace others with space
        function cleanText(text) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                const c = text.charCodeAt(i);
                if (c >= 32 && c <= 126) {
                    result += text.charAt(i);
                } else {
                    result += ' ';
                }
            }
            // Optionally, collapse multiple spaces
            return result.replace(/\s+/g, '\n').trim();
        }

        // Handle import
        document.getElementById('import-btn').onclick = () => {
            fileInput.click();
        };

        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                data = new Uint8Array(reader.result);
                const decoded = decodeBest(data);
                const cleaned = cleanText(decoded);
                outputEl.value = cleaned;
            };
            reader.readAsArrayBuffer(file);
        };

        // Save output
        document.getElementById('save-btn').onclick = () => {
            const blob = new Blob([outputEl.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cleaned_text.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>
</body>

</html>
